global:
  scrape_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs: [{targets: ['localhost:9090']}]
  - job_name: airflow
    metrics_path: /admin/metrics
    static_configs: [{targets: ['airflow-webserver:8080']}]
  - job_name: nginx
    static_configs: [{targets: ['nginx:80']}]
  - job_name: grafana
    static_configs: [{targets: ['grafana:3000']}]
