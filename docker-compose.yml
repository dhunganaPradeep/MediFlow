x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  user: "50000:0"
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__MASK_SECRETS_IN_LOGS: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.8.3 dbt-postgres==1.8.2 great-expectations==0.18.16 hvac==2.2.0 holidays==0.50"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/plugins:/opt/airflow/plugins:ro
    - ./dbt:/opt/dbt
    - ./etl:/opt/airflow/etl
    - ./data_generation:/opt/airflow/data_generation:ro
    - ./forecasting:/opt/airflow/forecasting:ro
    - airflow-logs:/opt/airflow/logs
  networks: [backend, data]
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  depends_on:
    postgres: {condition: service_healthy}
    redis: {condition: service_healthy}

services:
  postgres:
    image: postgres:16.3-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres -c shared_buffers=512MB -c work_mem=32MB
               -c max_connections=120 -c wal_level=replica
               -c log_min_duration_statement=500
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks: [data]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_READ_SEARCH]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server --save '' --appendonly no
    networks: [backend]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password $${AIRFLOW_ADMIN_PASSWORD} --firstname a --lastname d --role Admin --email admin@mediflow.local || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  superset:
    build: {context: docker/superset}
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
      - "8088:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset-home:/app/superset_home
    networks: [frontend, data, backend]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres: {condition: service_healthy}
      keycloak: {condition: service_healthy}

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    ports:
      - "8080:8080"
    env_file: .env
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks: [frontend, backend]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep 200"]
      interval: 30s
      timeout: 10s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    command: server
    volumes:
      - ./docker/vault/config.hcl:/vault/config/config.hcl:ro
      - vault-data:/vault/file
    networks: [backend]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports: ["443:443", "80:80"]
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks: [frontend]
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-q", "--no-check-certificate", "-O-", "https://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      superset: {condition: service_healthy}

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks: [backend]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.1.0
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [backend, frontend]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus: {condition: service_healthy}

networks:
  frontend: {}   # nginx <-> superset/keycloak/grafana
  backend: {}    # airflow, redis, vault, monitoring
  data: {}       # anything talking to postgres

volumes:
  pgdata: {}
  airflow-logs: {}
  superset-home: {}
  vault-data: {}
  prom-data: {}
  grafana-data: {}
