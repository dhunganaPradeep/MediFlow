# Prod overrides: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    deploy: {resources: {limits: {memory: 1g, cpus: '1.0'}}}
  airflow-worker:
    deploy: {resources: {limits: {memory: 1g, cpus: '1.0'}}}
  superset:
    deploy: {resources: {limits: {memory: 768m, cpus: '0.5'}}}
  nginx:
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot:ro
  certbot:
    image: certbot/certbot:v2.11.0
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done'

volumes:
  certbot-certs: {}
  certbot-www: {}
